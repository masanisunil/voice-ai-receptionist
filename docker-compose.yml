services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: voice_ai_receptionist
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d voice_ai_receptionist"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/voice_ai_receptionist?schema=public
      APP_BASE_URL: http://localhost:8080
    ports:
      - "8080:8080"
    command: sh -c "npx prisma migrate deploy && node dist/src/server.js"

volumes:
  postgres-data:
